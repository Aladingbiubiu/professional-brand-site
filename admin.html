<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理后台 | 山东众信</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #f5f7fb;
        }

        .admin-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 260px 1fr;
        }

        .admin-side {
            padding: 28px;
            color: #fff;
            background: var(--navy);
        }

        .admin-side h1 {
            margin: 0 0 8px;
            font-size: 22px;
            line-height: 1.35;
        }

        .admin-side p {
            margin: 0 0 28px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 14px;
        }

        .admin-nav button {
            width: 100%;
            margin-bottom: 10px;
            padding: 12px 14px;
            color: #fff;
            text-align: left;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            cursor: pointer;
        }

        .admin-nav button.active {
            color: var(--navy);
            background: var(--gold);
        }

        .admin-main {
            padding: 32px;
        }

        .admin-topbar {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
        }

        .admin-card {
            padding: 24px;
            background: #fff;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .login-card {
            width: min(420px, calc(100% - 32px));
            margin: 12vh auto 0;
        }

        .admin-form,
        .password-form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .admin-form label,
        .password-form label,
        .login-card label {
            display: grid;
            gap: 7px;
            color: var(--navy);
            font-size: 14px;
            font-weight: 700;
        }

        .admin-form .full,
        .password-form .full {
            grid-column: 1 / -1;
        }

        .admin-form input,
        .admin-form select,
        .admin-form textarea,
        .password-form input,
        .login-card input {
            width: 100%;
            padding: 12px 13px;
            border: 1px solid var(--line);
            font: inherit;
        }

        .admin-form textarea {
            resize: vertical;
        }

        .admin-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .admin-btn {
            padding: 10px 14px;
            color: #fff;
            background: var(--navy);
            border: 0;
            cursor: pointer;
            font-weight: 700;
        }

        .admin-btn.light {
            color: var(--navy);
            background: #edf2fb;
        }

        .admin-btn.danger {
            background: #9f2f2f;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }

        .filter-row select {
            padding: 10px 12px;
            border: 1px solid var(--line);
        }

        .article-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid var(--line);
        }

        .article-table th,
        .article-table td {
            padding: 13px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        .article-table th {
            color: var(--navy);
            background: #f7f9fd;
        }

        .status-pill {
            display: inline-block;
            padding: 4px 8px;
            color: var(--navy);
            background: #edf2fb;
            font-size: 12px;
        }

        .admin-message {
            min-height: 24px;
            margin-top: 14px;
            color: var(--muted);
        }

        .admin-message.error {
            color: #9f2f2f;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 900px) {
            .admin-shell {
                grid-template-columns: 1fr;
            }

            .admin-side {
                position: static;
            }

            .admin-main {
                padding: 20px;
            }

            .admin-form,
            .password-form {
                grid-template-columns: 1fr;
            }

            .article-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <section id="loginView" class="login-card admin-card hidden">
        <h1>内容管理后台</h1>
        <p>请输入管理员账号密码。</p>
        <form id="loginForm" class="login-form">
            <label>账号<input name="username" type="text" value="admin" required></label>
            <label>密码<input name="password" type="password" required></label>
            <button class="admin-btn" type="submit">登录</button>
            <p id="loginMessage" class="admin-message"></p>
        </form>
    </section>

    <section id="adminView" class="admin-shell hidden">
        <aside class="admin-side">
            <h1>山东众信内容后台</h1>
            <p id="userInfo">已登录</p>
            <div class="admin-nav">
                <button class="active" type="button" data-view="dashboard">工作台</button>
                <button type="button" data-view="articles">内容管理</button>
                <button type="button" data-view="editor">新建内容</button>
                <button type="button" data-view="settings">账号设置</button>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div>
                    <h2 id="viewTitle">工作台</h2>
                    <p id="viewHint">管理公告、动态、招商信息和案例内容。</p>
                </div>
                <div class="admin-actions">
                    <a class="admin-btn light" href="index.html" target="_blank" rel="noopener">查看官网</a>
                    <button id="logoutBtn" class="admin-btn light" type="button">退出</button>
                </div>
            </div>

            <section id="dashboardPanel" class="admin-card">
                <h3>近期内容</h3>
                <p>发布后的内容会自动进入官网首页和案例动态页。</p>
                <div id="dashboardList"></div>
            </section>

            <section id="articlesPanel" class="hidden">
                <div class="filter-row">
                    <select id="categoryFilter">
                        <option value="">全部栏目</option>
                        <option value="auction">拍卖公告</option>
                        <option value="industry">行业动态</option>
                        <option value="investment">招商信息</option>
                        <option value="case">项目案例</option>
                        <option value="wechat">公众号文章</option>
                    </select>
                    <select id="statusFilter">
                        <option value="">全部状态</option>
                        <option value="draft">草稿</option>
                        <option value="published">已发布</option>
                        <option value="archived">下架</option>
                    </select>
                    <button id="newArticleBtn" class="admin-btn" type="button">新建内容</button>
                </div>
                <table class="article-table">
                    <thead>
                        <tr><th>标题</th><th>栏目</th><th>状态</th><th>日期</th><th>操作</th></tr>
                    </thead>
                    <tbody id="articleRows"></tbody>
                </table>
            </section>

            <section id="editorPanel" class="admin-card hidden">
                <form id="articleForm" class="admin-form">
                    <input name="id" type="hidden">
                    <label class="full">标题<input name="title" type="text" required></label>
                    <label>栏目
                        <select name="category" required>
                            <option value="auction">拍卖公告</option>
                            <option value="industry">行业动态</option>
                            <option value="investment">招商信息</option>
                            <option value="case">项目案例</option>
                            <option value="wechat">公众号文章</option>
                        </select>
                    </label>
                    <label>状态
                        <select name="status">
                            <option value="draft">草稿</option>
                            <option value="published">已发布</option>
                            <option value="archived">下架</option>
                        </select>
                    </label>
                    <label>发布日期<input name="published_at" type="date" required></label>
                    <label>排序值<input name="sort_order" type="number" value="0"></label>
                    <label>标签<input name="tag" type="text" placeholder="公告 / 招商 / 交通工程"></label>
                    <label>外链<input name="external_url" type="url" placeholder="公众号文章可填写链接"></label>
                    <label class="full">摘要<textarea name="summary" rows="3"></textarea></label>
                    <label class="full">正文<textarea name="body" rows="8" placeholder="站内文章正文，可留空"></textarea></label>
                    <label>封面图路径<input name="cover_image" type="text" placeholder="uploads/example.jpg"></label>
                    <label>上传封面<input id="coverUpload" type="file" accept="image/*"></label>
                    <div class="admin-actions full">
                        <button class="admin-btn" type="submit">保存</button>
                        <button id="previewBtn" class="admin-btn light" type="button">预览</button>
                        <button id="clearFormBtn" class="admin-btn light" type="button">清空</button>
                    </div>
                </form>
                <p id="editorMessage" class="admin-message"></p>
            </section>

            <section id="settingsPanel" class="admin-card hidden">
                <h3>修改密码</h3>
                <form id="passwordForm" class="password-form">
                    <label>原密码<input name="old_password" type="password" required></label>
                    <label>新密码<input name="new_password" type="password" required minlength="6"></label>
                    <div class="admin-actions full">
                        <button class="admin-btn" type="submit">更新密码</button>
                    </div>
                </form>
                <p id="passwordMessage" class="admin-message"></p>
            </section>
        </main>
    </section>

    <script src="admin.js"></script>
</body>
</html>
