<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">众信价格评估拍卖有限公司</title>
  <desc id="desc">金棕色众信品牌标识，包含公司中文名、英文名和价格公正、评估专业、拍卖规范、服务诚信标语。</desc>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5e3710"/>
      <stop offset="45%" stop-color="#9b6a22"/>
      <stop offset="100%" stop-color="#6a4215"/>
    </linearGradient>
    <linearGradient id="softGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#efe4cf"/>
      <stop offset="60%" stop-color="#b7945c"/>
      <stop offset="100%" stop-color="#f6f0e6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#6a4215" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="920" height="260" fill="#fff"/>

  <g transform="translate(32 24)" filter="url(#shadow)">
    <path d="M14 12 H168 V24 H180 V190 H168 V202 H14 V190 H2 V24 H14 Z" fill="none" stroke="url(#gold)" stroke-width="6"/>
    <rect x="22" y="31" width="138" height="152" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <text x="91" y="90" text-anchor="middle" fill="url(#gold)" font-family="KaiTi, STKaiti, SimSun, serif" font-size="70" font-weight="700">众</text>
    <text x="91" y="157" text-anchor="middle" fill="url(#gold)" font-family="KaiTi, STKaiti, SimSun, serif" font-size="70" font-weight="700">信</text>
    <g transform="translate(121 66)">
      <rect width="35" height="48" rx="5" fill="#b31717"/>
      <text x="18" y="12" text-anchor="middle" fill="#fff" font-family="SimSun, serif" font-size="11" writing-mode="tb">诚信为本</text>
      <text x="6" y="12" text-anchor="middle" fill="#fff" font-family="SimSun, serif" font-size="11" writing-mode="tb">专业公正</text>
    </g>
    <path d="M53 175 C72 158 82 158 101 175 C116 163 125 160 143 175 Z" fill="url(#softGold)" opacity="0.9"/>
    <path d="M43 184 H141 M62 193 H157 M89 201 H137" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g transform="translate(248 60)">
    <text x="0" y="62" fill="url(#gold)" font-family="STSong, SimSun, Songti SC, serif" font-size="48" font-weight="700" letter-spacing="8">众信价格评估拍卖有限公司</text>
    <line x1="2" y1="91" x2="78" y2="91" stroke="url(#gold)" stroke-width="2"/>
    <text x="102" y="99" fill="#6a4215" font-family="Georgia, Times New Roman, serif" font-size="22" font-weight="700" letter-spacing="2.5">ZHONGXIN PRICE APPRAISAL &amp; AUCTION CO., LTD.</text>
    <line x1="718" y1="91" x2="794" y2="91" stroke="url(#gold)" stroke-width="2"/>
    <text x="0" y="151" fill="#6a4215" font-family="STSong, SimSun, Songti SC, serif" font-size="23" letter-spacing="12">价格公正 | 评估专业 | 拍卖规范 | 服务诚信</text>
  </g>
</svg>
