  <defs>
    <linearGradient id="sealGold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5b3716"/>
      <stop offset="0.52" stop-color="#9a6d2e"/>
      <stop offset="1" stop-color="#5d3816"/>
    </linearGradient>
  </defs>
  <rect width="760" height="154" fill="#fff"/>
  <g transform="translate(4 4)">
    <rect x="0" y="0" width="70" height="146" fill="#fff" stroke="url(#sealGold)" stroke-width="6"/>
    <rect x="9" y="9" width="52" height="100" fill="none" stroke="url(#sealGold)" stroke-width="2"/>
    <text x="35" y="50" fill="url(#sealGold)" font-family="KaiTi, STKaiti, SimSun, serif" font-size="34" font-weight="700" text-anchor="middle">众</text>
    <text x="35" y="91" fill="url(#sealGold)" font-family="KaiTi, STKaiti, SimSun, serif" font-size="34" font-weight="700" text-anchor="middle">信</text>
    <rect x="0" y="112" width="70" height="34" fill="url(#sealGold)"/>
