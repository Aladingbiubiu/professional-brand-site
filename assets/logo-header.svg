    <text x="0" y="84" fill="#65451f" font-family="Georgia, Times New Roman, serif" font-size="25" font-weight="700" letter-spacing="2.5">ZHONGXIN PRICE APPRAISAL &amp; AUCTION CO., LTD.</text>
